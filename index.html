<!DOCTYPE html>
<html>
<head>
  <title>Masrama</title>

  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="assets/logo.png">

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="app">

  <!-- 🔥 TOP BAR -->
  <div class="topbar" id="topbar">

    <!-- MASRAMA LOGO -->
    <div class="logo" onclick="toggleMenu()">
      <span class="mas">MAS</span><span class="rama">RAMA</span>
    </div>

    <!-- DROPDOWN MENU -->
    <div class="menu" id="menu">
      <div>History</div>
      <div>Bookmarks</div>
      <div>Appearance</div>
      <div class="login">
        <img src="assets/user.png">
        Log in
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs" id="tabs"></div>

    <!-- SEARCH -->
    <input id="search" placeholder="Search Google or enter URL...">

  </div>

  <!-- 🔥 MAIN VIEW -->
  <div class="view">

    <!-- HOME DASH -->
    <div class="dashboard" id="home">

      <div class="timeBlock">
        <div class="timeWrap">
          <div class="time" id="time"></div>
          <div class="ampm" id="ampm"></div>
        </div>

        <div class="greeting">Good Morning, <span>Explorer</span></div>
        <div class="date" id="date"></div>

        <div class="divider">
          <span></span>
          <div class="dot"></div>
          <span></span>
        </div>
      </div>

      <div class="searchBox">
        <input placeholder="Search Google or enter a URL...">
      </div>

    </div>

    <!-- 🔥 BROWSER FRAME -->
    <iframe id="frame"></iframe>

  </div>

</div>

<script src="main.js"></script>
</body>
</html>
