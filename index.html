<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Masrama</title>

  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="assets/logo.png">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

  <!-- LOGO + MENU -->
  <div class="brand" id="brandBtn">
    <span class="logoLeft">MAS</span><span class="logoRight">RAMA</span>

    <!-- dropdown -->
    <div class="menu" id="menu">
      <div>History</div>
      <div>Bookmarks</div>
      <div>Appearance</div>
      <div class="loginRow">
        <img src="assets/user.png" alt="login">
        <span>Login</span>
      </div>
    </div>
  </div>

  <!-- NAV -->
  <div class="nav">

    <button>←</button>
    <button>→</button>
    <button>⟳</button>

    <input id="search" placeholder="Search or enter URL...">
    <button onclick="go()">Go</button>

  </div>

  <!-- RIGHT ICON -->
  <div class="rightIcon">
    <img src="assets/user.png" class="userIcon">
  </div>

</div>


<!-- MAIN -->
<div class="dashboard">

  <!-- CLOCK -->
  <div class="timeBlock">
    <div class="timeWrap">
      <div class="time" id="time"></div>
      <div class="ampm" id="ampm"></div>
    </div>

    <div class="greeting">Good Morning, <span>Explorer</span></div>
    <div class="date" id="date"></div>

    <div class="line"></div>
  </div>

</div>

<script src="main.js"></script>

</body>
</html>
