<!DOCTYPE html>
<html>
<head>
  <title>Masrama</title>

  <link rel="stylesheet" href="style.css">

  <!-- FAVICON -->
  <link rel="icon" href="assets/logo.png">

</head>

<body>

<div class="app">

  <!-- TOP -->
  <div class="topbar">

    <div class="tabs" id="tabs"></div>

    <div class="nav">
      <button>←</button>
      <button>→</button>
      <button>⟳</button>

      <input id="search" placeholder="Search Google or enter URL...">

      <button onclick="go()">Go</button>
    </div>

  </div>

  <!-- MAIN DASH -->
  <div class="dashboard">

    <div class="timeBlock">
      <div class="time" id="time"></div>
      <div class="greeting">Good Morning, <span>Explorer</span></div>
      <div class="date" id="date"></div>
      <div class="line"></div>
    </div>

    <div class="searchBox">
      <input placeholder="Search Google or enter a URL...">
    </div>

    <div class="apps">
      <div class="appItem">🎮<span>Opera GX</span></div>
      <div class="appItem">▶<span>YouTube</span></div>
      <div class="appItem">🐙<span>GitHub</span></div>
      <div class="appItem">🔥<span>Reddit</span></div>
      <div class="appItem">🎵<span>Spotify</span></div>
      <div class="appItem">💻<span>CodePen</span></div>
    </div>

  </div>

</div>

<script src="main.js"></script>
</body>
</html>
