<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Masrama</title>

  <link rel="stylesheet" href="style.css">

  <!-- ICON -->
  <link rel="icon" href="assets/logo.png">

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- ================= TOP BAR ================= -->
<div class="topbar" id="topbar">

  <!-- LOGO (click = menu) -->
  <div class="logo" id="logoBtn">
    <span class="mas">MAS</span><span class="rama">RAMA</span>
  </div>

  <!-- MENU DROPDOWN -->
  <div class="menu" id="menu">
    <div>History</div>
    <div>Bookmarks</div>
    <div>Appearance</div>
    <div class="loginRow">
      <img src="assets/login.png" class="loginIcon">
      <span>Login</span>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs" id="tabs"></div>

  <!-- SEARCH / NAV -->
  <div class="nav">
    <button>←</button>
    <button>→</button>
    <button>⟳</button>

    <input id="search" placeholder="Search Google or enter URL...">

    <!-- LOGIN ICON (top right) -->
    <img src="assets/login.png" class="topLogin">
  </div>

</div>

<!-- ================= DASHBOARD ================= -->
<div class="dashboard">

  <!-- CLOCK -->
  <div class="timeBlock">
    <div class="timeWrap">
      <div class="time" id="time"></div>
      <div class="ampm" id="ampm"></div>
    </div>

    <div class="greeting">Good Morning, <span>Explorer</span></div>
    <div class="date" id="date"></div>

    <div class="line"></div>
  </div>

  <!-- SEARCH -->
  <div class="searchBox">
    <input placeholder="Search Google or enter a URL...">
  </div>

</div>

<script src="main.js"></script>
</body>
</html>
