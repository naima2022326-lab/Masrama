<!DOCTYPE html>
<html>
<head>
  <title>Masrama</title>

  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="assets/logo.png">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

  <!-- MASRAMA LOGO -->
  <div class="brand" onclick="toggleMenu()">
    <span class="m">MAS</span><span class="r">RAMA</span>

    <!-- dropdown -->
    <div class="menu" id="menu">
      <div>History</div>
      <div>Bookmarks</div>
      <div>Appearance</div>
      <div>Settings</div>

      <div class="login">
        <img src="/mnt/data/file_000000003b7471fd81302dbf431b6d79" />
        Login
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs" id="tabs"></div>

  <!-- NAV -->
  <div class="nav">

    <button onclick="back()">←</button>
    <button onclick="forward()">→</button>
    <button onclick="reload()">⟳</button>

    <input id="search" placeholder="Search or enter URL...">
    <button onclick="go()">Go</button>

  </div>

</div>

<!-- CLOCK AREA -->
<div class="center">

  <div class="timeWrap">
    <div class="time" id="time"></div>
    <div class="ampm" id="ampm"></div>
  </div>

  <div class="greeting">Good Morning, <span>Explorer</span></div>
  <div class="date" id="date"></div>

</div>

<!-- QUICK ICONS -->
<div class="apps">
  <div>🎮 Opera</div>
  <div>▶ YouTube</div>
  <div>🐙 GitHub</div>
  <div>🔥 Reddit</div>
</div>

<!-- WEB PREVIEW -->
<div class="preview">
  <iframe id="frame" src="https://www.google.com"></iframe>
</div>

<script src="main.js"></script>
</body>
</html>
