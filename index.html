<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Masrama</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="assets/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="logo" onclick="toggleHistory()">MAS<span>RAMA</span></div>
    <div class="tabs" id="tabs"></div>
    <div class="nav">
      <button class="navBtn" onclick="goBack()">←</button>
      <button class="navBtn" onclick="goForward()">→</button>
      <button class="navBtn" onclick="reloadFrame()">⟳</button>
      <input id="search" placeholder="Search or enter URL..." onkeydown="if(event.key==='Enter') go('search')">
    </div>
  </div>
  
  <div id="browserView" class="browserView" style="display:none;">
    <iframe id="webFrame" src=""></iframe>
  </div>
  
  <div class="dashboard" id="dashboard">
    <div class="timeBlock">
      <div class="timeWrap">
        <div class="time" id="time"></div>
        <div class="ampm" id="ampm"></div>
      </div>
      <div class="greeting">Good Morning, <span>Explorer</span></div>
      <div class="date" id="date"></div>
      <div class="divider"><span></span><div class="dot"></div><span></span></div>
      <div class="thanks">Special thanks to Muna Jama, Nasra Diriye & Naima Mohamed</div>
    </div>

    <div class="searchBox">
      <input id="centerSearch" placeholder="Search Google or enter a URL..." onkeydown="if(event.key==='Enter') go('centerSearch')">
    </div>

    <div class="apps">
      <div class="appItem" onclick="loadUrl('https://www.youtube.com')">▶<span>YouTube</span></div>
      <div class="appItem" onclick="loadUrl('https://www.github.com')">🐙<span>GitHub</span></div>
      <div class="appItem" onclick="loadUrl('https://www.spotify.com')">🎵<span>Spotify</span></div>
      <div class="appItem" onclick="loadUrl('https://www.reddit.com')">🔥<span>Reddit</span></div>
    </div>

    <div class="footer">POWERED BY MASRAMA</div>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
